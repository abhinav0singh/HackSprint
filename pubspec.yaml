name: moneybyte
description: MoneyByte - Offline-first savings goal tracker for India.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  path_provider: ^2.1.2
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0+1
  percent_indicator: ^4.2.3
  confetti: ^0.7.0
  home_widget: ^0.6.0
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  
